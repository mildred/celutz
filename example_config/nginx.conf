server {
  listen 80;
  listen [::]:80;
  server_name celutz.example.com;

  location ^~ /.well-known/acme-challenge/ {
      default_type "text/plain";
      root         /var/lib/acme/challenges;
  }
 
  location = /.well-known/acme-challenge/ {
      return 404;
  }
 
  location ^~ / {
      return 301 https://$server_name$request_uri;
  }

}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name celutz.example.com;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!MEDIUM:!LOW:!aNULL:!NULL:!SHA;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;

  ssl_certificate     /etc/letsencrypt/live/celutz.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/celutz.example.com/privkey.pem;

  keepalive_timeout    70;
  sendfile             on;
  # This lets clients send very large panorama (200 MB)
  client_body_timeout 600s;
  client_max_body_size 200m;

  root /nowhere;

  # Serve tiles and images directly
  location /media/ {
    root /srv/celutz/celutz;
  }

  location /static/ {
    root /srv/celutz/celutz;
  }

  location / {
        # This uses a Unix socket (see systemd example config), but you can also use http://localhost:12345)
        proxy_pass         http://unix:/srv/celutz/celutz/gunicorn.sock;
        proxy_redirect     off;
    
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
  }

}
